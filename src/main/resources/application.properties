spring.application.name=bff-gateway


server.port=9090
# =========================
# ROUTES
# =========================

spring.cloud.gateway.server.webflux.routes[0].id=register-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:9091
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/register/**

spring.cloud.gateway.server.webflux.routes[1].id=login-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:9092
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/login/**

spring.cloud.gateway.server.webflux.routes[2].id=roles-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:9093
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/roles/**

spring.cloud.gateway.server.webflux.routes[3].id=projects-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:9094
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/projects/**

spring.cloud.gateway.server.webflux.routes[4].id=metrics-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:9095
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/metrics/**

# =========================
# ACTUATOR
# =========================

management.endpoints.web.exposure.include=*

# =========================
# LOGGING
# =========================

logging.level.org.springframework.cloud.gateway=DEBUG

spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5175
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.add-to-simple-url-handler-mapping=true

spring.main.web-application-type=reactive

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
